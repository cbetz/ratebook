<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <rect width="720" height="300" rx="10" fill="#1b1e2b"/>
  <rect width="720" height="34" rx="10" fill="#272b3d"/>
  <rect y="20" width="720" height="14" fill="#272b3d"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="360" y="22" text-anchor="middle" fill="#8b90a5" font-size="12">ratebook — what will this kWh cost?</text>
  <text x="20" y="66" fill="#7aa2f7"><tspan fill="#565f89">$</tspan> uv run python quickstart.py</text>
  <text x="20" y="92" fill="#9ece6a">ok=True  total=$139.13344</text>
  <text x="20" y="112" fill="#565f89" font-size="12">    # 1244 kWh on a flat $0.10276/kWh tariff + $11.30/mo — deterministic, no data download</text>
  <text x="20" y="150" fill="#7aa2f7"><tspan fill="#565f89">$</tspan> uv run ratebook-data scorecard</text>
  <text x="20" y="176" fill="#c0caf5">| Metric                  | Score |</text>
  <text x="20" y="196" fill="#c0caf5">| Time-of-use (yes/no)    |  89%  |</text>
  <text x="20" y="216" fill="#c0caf5">| Fixed charge amount     |  78%  |</text>
  <text x="20" y="236" fill="#e0af68"><tspan fill="#c0caf5">| </tspan><tspan font-weight="bold">Overall structural</tspan><tspan fill="#c0caf5">      |  </tspan><tspan font-weight="bold">92%</tspan><tspan fill="#c0caf5">  |</tspan></text>
  <text x="20" y="256" fill="#565f89" font-size="12">    # LLM-extracted from utility PDFs, graded vs URDB — every "miss" is URDB being stale</text>
  <text x="20" y="284" fill="#565f89" font-size="12">eval-harnessed · provenance per record · "unknown" is a first-class answer</text>
</svg>
