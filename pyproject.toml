# Workspace root (virtual): the three publishable packages live under packages/.
[tool.uv.workspace]
members = ["packages/*"]
exclude = ["packages/ratebook-ts"]  # TypeScript package — pnpm, not a uv member

[dependency-groups]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.100",
    "ruff>=0.5",
]
# PySAM is the validation oracle for the rate engine (tests skip if it is absent). It is a
# test/validation dependency only — the engine itself has zero runtime dependencies.
validation = [
    "nrel-pysam>=7.0",
]

[tool.ruff]
target-version = "py312"
line-length = 100
# Generated by scripts/sync_vendor.py — a verbatim copy of already-linted source; never edit.
extend-exclude = ["packages/ratebook-homeassistant/custom_components/ratebook/vendor"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
testpaths = ["packages"]
addopts = "-q"
# Runtime Home Assistant tests (packages/ratebook-homeassistant/tests_ha/) use pytest-asyncio's
# auto mode, as pytest-homeassistant-custom-component requires. Harmless to the sync suites.
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
