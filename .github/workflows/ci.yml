name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync workspace (incl. the PySAM validation oracle)
        run: uv sync --group validation

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

  typescript:
    name: TypeScript (engine port)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: packages/ratebook-ts/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm -C packages/ratebook-ts install --frozen-lockfile

      - name: Test
        run: pnpm -C packages/ratebook-ts test
