[project]
name = "ratebook"
version = "0.0.1"
description = "Deterministic US electricity tariff rate engine: pure functions, property-tested."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{name = "Chris Betz"}]
requires-python = ">=3.12"
keywords = ["electricity", "tariff", "rate-engine", "energy", "utility", "billing", "deterministic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/cbetz/ratebook"
Repository = "https://github.com/cbetz/ratebook"
Issues = "https://github.com/cbetz/ratebook/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
