[project]
name = "ratebook-data"
version = "0.0.1"
description = "Ratebook data plant: source ingestion (URDB, EIA), DuckDB warehouse, dataset releases."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "LICENSE-DATA"]
authors = [{name = "Chris Betz"}]
requires-python = ">=3.12"
keywords = ["electricity", "tariff", "energy", "utility", "urdb", "eia", "duckdb", "dataset"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
]
dependencies = [
    "duckdb>=1.0",
    "httpx>=0.27",
    "pypdf>=4.0",
    "ratebook",
]

[project.urls]
Homepage = "https://github.com/cbetz/ratebook"
Repository = "https://github.com/cbetz/ratebook"
Issues = "https://github.com/cbetz/ratebook/issues"

[project.optional-dependencies]
# The extractor calls the Anthropic API; installed on demand, not required for the engine.
extract = ["anthropic>=0.40"]

[tool.uv.sources]
ratebook = { workspace = true }

[project.scripts]
ratebook-data = "ratebook_data.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
