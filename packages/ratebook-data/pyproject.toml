[project]
name = "ratebook-data"
version = "0.0.1"
description = "Ratebook data plant: source ingestion (URDB, EIA), DuckDB warehouse, dataset releases."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.0",
    "httpx>=0.27",
]

[project.scripts]
ratebook-data = "ratebook_data.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
